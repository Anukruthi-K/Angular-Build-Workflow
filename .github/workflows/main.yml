name: Build My Angular App

on: 
  push:
    branches: [ main ]

jobs:
  build-angular-app:
    runs-on: ubuntu-latest

    steps:
      - name: actions/checkout@v6.0.2
      - name: setup Node JS
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22.X
      - name: Install Dependencies
        run: npm install
      - name: Build Angular App
        run: nap run build
        
